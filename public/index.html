<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;600;700&family=IBM+Plex+Mono:wght@400&display=swap" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Compare two code snippets line-by-line via the CodeDiff API." />
  <title>CodeDiff</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="theme-diff portfolio-designed landing-v2 demo-shell">
  <div class="bg-animation" aria-hidden="true"></div>
  <header class="header">
        <div class="header__top">
      <a class="header__brand" href="https://piyushm.dev">piyushm.dev</a>
      <button type="button" id="theme-toggle" class="theme-toggle" aria-label="Toggle color theme" title="Toggle theme"><span class="theme-toggle__icon theme-toggle__icon--sun" aria-hidden="true">&#9728;</span><span class="theme-toggle__icon theme-toggle__icon--moon" aria-hidden="true">&#9789;</span></button>
    </div>

    <p class="eyebrow">C++ diff engine</p>
      <h1>CodeDiff</h1>
    <p>Compare two snippets line-by-line — same logic as the C++ CLI, exposed over HTTP.</p>
  
    <a class="header__github" href="https://github.com/PiyushMishra318/CodeDiff" target="_blank" rel="noopener noreferrer">View on GitHub</a>
  </header>
  <main class="page-main main">
    <p class="demo-banner">Live demo below — this page is the working tool, not just a brochure.</p>
    <div class="toolbar">
      <button type="button" id="load-equal" class="btn btn--ghost">Load equal example</button>
      <button type="button" id="load-diff" class="btn btn--ghost">Load diff example</button>
    </div>
    <div class="panes">
      <div>
        <label for="left">Snippet A</label>
        <textarea id="left" rows="16" placeholder="First file contents…"></textarea>
      </div>
      <div>
        <label for="right">Snippet B</label>
        <textarea id="right" rows="16" placeholder="Second file contents…"></textarea>
      </div>
    </div>
    <button id="compare" type="button" class="btn">Compare</button>
    <p id="result" class="result" aria-live="polite"></p>

    <section id="diff-section" class="diff-section hidden" aria-label="Diff viewer">
      <div class="diff-toolbar">
        <p id="diff-summary" class="diff-summary"></p>
        <div class="diff-view-toggle" role="group" aria-label="Diff view mode">
          <button type="button" id="view-split" class="btn btn--ghost btn--toggle is-active">Split</button>
          <button type="button" id="view-unified" class="btn btn--ghost btn--toggle">Unified</button>
        </div>
      </div>
      <div id="diff-viewer" class="diff-viewer"></div>
    </section>
  </main>
  <footer class="site-footer footer">
    <p>MIT © 2026 · <a href="https://piyushm.dev">piyushm.dev</a> · <a href="https://github.com/PiyushMishra318/CodeDiff" target="_blank" rel="noopener noreferrer">View on GitHub</a></p>
  </footer>
  <script src="/app.js"></script>
  <script src="/theme.js"></script>
</body>
</html>
